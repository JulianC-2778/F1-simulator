<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TORCS commentary with voice</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #07090d;
  --surface: #0f1219;
  --surf2:   #171c27;
  --border:  #1e2535;
  --bord2:   #2a3347;
  --accent:  #0ea5e9;
  --green:   #10b981;
  --red:     #ef4444;
  --orange:  #f97316;
  --text:    #e2e8f0;
  --dim:     #64748b;
  --faint:   #1e2535;
  --drawer:  400px;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* cinema vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 45%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 1;
}

/* ─── Top Chrome ──────────────────────────────────────── */
#chrome {
  position: fixed; top: 0; left: 0; right: 0; height: 48px;
  background: rgba(7,9,13,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  z-index: 50;
}

#brand {
  font-size: 12px; font-weight: 800;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--accent);
  display: flex; align-items: center; gap: 8px;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); box-shadow: 0 0 5px var(--red);
  animation: blink 1.6s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.ws-row { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--dim); }
.ws-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); transition: all .3s; }
.ws-dot.on { background: var(--green); box-shadow: 0 0 5px var(--green); }

#s-btn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--bord2); background: var(--surf2);
  color: var(--dim); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; margin-left: 12px;
}
#s-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ─── Stage ───────────────────────────────────────────── */
#stage {
  position: fixed;
  bottom: 80px;
  left: 0; right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 0 12%;
  z-index: 10;
  pointer-events: none;
  text-align: center;
}

/* Loading dots — visible while AI is generating */
#loading {
  display: flex; gap: 7px; align-items: center;
  opacity: 0;
  transition: opacity .3s ease;
}
#loading.show { opacity: 1; }
#loading span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--dim);
  animation: dot-pulse 1.2s ease-in-out infinite;
}
#loading span:nth-child(2) { animation-delay: .2s; }
#loading span:nth-child(3) { animation-delay: .4s; }
@keyframes dot-pulse { 0%,80%,100%{transform:scale(.7);opacity:.4} 40%{transform:scale(1);opacity:1} }

/* Subtitle block */
#subtitle {
  opacity: 0;
  transition: opacity .35s ease;
}
#subtitle.show { opacity: 1; }

#sub-zh {
  font-size: 26px;
  font-weight: 500;
  color: #ffffff;
  line-height: 1.55;
  text-shadow: 0 2px 20px rgba(0,0,0,1), 0 0 50px rgba(0,0,0,.8);
  letter-spacing: .01em;
}

/* ─── Bottom bar ──────────────────────────────────────── */
#bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
  background: rgba(7,9,13,0.9);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  gap: 18px; z-index: 50;
}
#bar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 5%, var(--accent) 30%, var(--accent) 70%, transparent 95%);
  opacity: .3;
}

.bar-btn {
  padding: 5px 16px;
  border: 1px solid var(--bord2); border-radius: 18px;
  background: var(--surf2); color: var(--dim);
  font-size: 12px; cursor: pointer; font-family: inherit;
  transition: all .2s;
}
.bar-btn:hover { border-color: var(--accent); color: var(--text); }

.tok-wrap { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--dim); }
.tok-track { width: 72px; height: 3px; background: var(--faint); border-radius: 99px; overflow: hidden; }
.tok-fill  { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s, background .4s; }

/* ─── Settings Overlay & Drawer ───────────────────────── */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(3px); z-index: 100;
}
#overlay.open { display: block; }

#drawer {
  position: fixed; top: 0; right: 0;
  width: var(--drawer); height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 101;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
#drawer.open { transform: none; }

.d-hd {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.d-hd h2 { font-size: 15px; font-weight: 600; }
.d-cl {
  width: 30px; height: 30px; border: none;
  background: var(--surf2); border-radius: 6px;
  color: var(--dim); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.d-cl:hover { color: var(--text); }
.d-bd { flex: 1; overflow-y: auto; padding: 0 20px 24px; }

.s-sec { border-bottom: 1px solid var(--border); }
.s-hd {
  padding: 13px 0; font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--dim); cursor: pointer; user-select: none;
  display: flex; align-items: center; justify-content: space-between;
  transition: color .15s;
}
.s-hd:hover { color: var(--text); }
.s-ar { transition: transform .2s; }
.s-hd.cl .s-ar { transform: rotate(-90deg); }
.s-bd { padding-bottom: 16px; display: flex; flex-direction: column; gap: 12px; }
.s-bd.cl { display: none; }

label { font-size: 12px; color: var(--dim); display: block; margin-bottom: 4px; }
input[type=text], input[type=password], select, textarea {
  width: 100%; background: var(--surf2); border: 1px solid var(--bord2);
  border-radius: 8px; color: var(--text); padding: 8px 12px;
  font-size: 13px; outline: none; font-family: inherit; transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

.sl-row { display: flex; align-items: center; gap: 10px; }
.sl-row input[type=range] { flex: 1; accent-color: var(--accent); padding: 0; cursor: pointer; }
.sl-val { font-size: 12px; color: var(--accent); min-width: 36px; text-align: right; }

.tog { display: flex; align-items: center; gap: 9px; }
.tog label { margin: 0; color: var(--text); font-size: 13px; cursor: pointer; }
.tog input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

.btn {
  padding: 8px 16px; border: none; border-radius: 8px;
  font-size: 13px; cursor: pointer; font-family: inherit;
  width: 100%; transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.bp { background: var(--accent); color: #fff; }
.bs { background: var(--surf2); color: var(--text); border: 1px solid var(--bord2); }

.tip { font-size: 11px; color: var(--dim); line-height: 1.5; }
.tip strong { color: var(--text); }
.n { font-size: 11px; text-align: center; min-height: 16px; }
.n.ok  { color: var(--green); }
.n.err { color: var(--red); }
.sep { border: none; border-top: 1px solid var(--border); margin: 2px 0; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--bord2); border-radius: 99px; }
</style>
</head>
<body>

<div id="chrome">
  <div id="brand"><span class="live-dot"></span>TORCS LIVE</div>
  <div style="display:flex;align-items:center">
    <div class="ws-row">
      <span class="ws-dot" id="ws-dot"></span>
      <span id="ws-lbl">Disconnected</span>
    </div>
    <button id="s-btn" onclick="openDrawer()" title="Settings">⚙</button>
  </div>
</div>

<div id="stage">
  <div id="loading">
    <span></span><span></span><span></span>
  </div>
  <div id="subtitle">
    <p id="sub-zh"></p>
  </div>
</div>

<div id="bar">
  <button class="bar-btn" onclick="manual()">▶ Commentary</button>
  <button class="bar-btn" onclick="clearAll()">Clear</button>
  <div class="tok-wrap">
    <div class="tok-track"><div class="tok-fill" id="tok-fill" style="width:0%"></div></div>
    <span id="tok-lbl">0 tokens</span>
  </div>
</div>

<div id="overlay" onclick="closeDrawer()"></div>

<aside id="drawer">
  <div class="d-hd">
    <h2>⚙ Settings</h2>
    <button class="d-cl" onclick="closeDrawer()">✕</button>
  </div>
  <div class="d-bd">

    <div class="s-sec">
      <div class="s-hd" onclick="togSec(this)">AI Model Config <span class="s-ar">▾</span></div>
      <div class="s-bd">
        <div><label>Base URL</label><input type="text" id="url" placeholder="http://localhost:1234/v1"></div>
        <div><label>API Key</label><input type="password" id="key" placeholder="Leave blank for local servers"></div>
        <div><label>Model</label><input type="text" id="mdl" placeholder="granite-4.1-8b"></div>
        <div>
          <label>Temperature: <span id="tv">0.80</span></label>
          <div class="sl-row">
            <input type="range" min="0" max="2" step="0.05" value="0.8" id="tr"
              oninput="document.getElementById('tv').textContent=parseFloat(this.value).toFixed(2)">
          </div>
        </div>
        <div class="tog">
          <input type="checkbox" id="st" checked>
          <label for="st">Streaming output</label>
        </div>
        <button class="btn bp" onclick="saveApi()">Save model config</button>
        <div class="n" id="n1"></div>
      </div>
    </div>

    <div class="s-sec">
      <div class="s-hd cl" onclick="togSec(this)">Commentator persona <span class="s-ar">▾</span></div>
      <div class="s-bd cl">
        <div>
          <label>Context (tokens): <span id="ctv">4096</span></label>
          <div class="sl-row">
            <input type="range" min="512" max="32768" step="256" value="4096" id="ctr"
              oninput="document.getElementById('ctv').textContent=this.value">
          </div>
        </div>
        <div>
          <label>Reply length (tokens): <span id="rtv">512</span></label>
          <div class="sl-row">
            <input type="range" min="128" max="4096" step="64" value="512" id="rtr"
              oninput="document.getElementById('rtv').textContent=this.value">
          </div>
        </div>
        <div><label>System Prompt</label><textarea id="persona" rows="6"></textarea></div>
        <button class="btn bp" onclick="saveCtx()">Save</button>
        <div class="n" id="n2"></div>
      </div>
    </div>

    <div class="s-sec">
      <div class="s-hd cl" onclick="togSec(this)">Voice settings <span class="s-ar">▾</span></div>
      <div class="s-bd cl">
        <div class="tog">
          <input type="checkbox" id="ve" checked onchange="syncVoice()">
          <label for="ve">Enable voice commentary</label>
        </div>
        <div>
          <label>Voice</label>
          <select id="vsel" onchange="syncVoice()"><option value="">System default</option></select>
        </div>
        <div>
          <label>Speed: <span id="vrv">1.1</span></label>
          <div class="sl-row">
            <input type="range" min="0.5" max="2" step="0.1" value="1.1" id="vrr"
              oninput="document.getElementById('vrv').textContent=parseFloat(this.value).toFixed(1);syncVoice()">
          </div>
        </div>
        <div>
          <label>Pitch: <span id="vpv">1.0</span></label>
          <div class="sl-row">
            <input type="range" min="0.5" max="2" step="0.1" value="1.0" id="vpr"
              oninput="document.getElementById('vpv').textContent=parseFloat(this.value).toFixed(1);syncVoice()">
          </div>
        </div>
        <div>
          <label>Volume: <span id="vvv">1.0</span></label>
          <div class="sl-row">
            <input type="range" min="0" max="1" step="0.05" value="1.0" id="vvr"
              oninput="document.getElementById('vvv').textContent=parseFloat(this.value).toFixed(2);syncVoice()">
          </div>
        </div>
        <button class="btn bs" onclick="testVoice()">🔊 Test voice</button>
      </div>
    </div>

    <div class="s-sec">
      <div class="s-hd cl" onclick="togSec(this)">Auto commentary <span class="s-ar">▾</span></div>
      <div class="s-bd cl">
        <div>
          <label>Interval (s, 0 = off): <span id="av">0</span></label>
          <div class="sl-row">
            <input type="range" min="0" max="60" step="1" value="0" id="ar"
              oninput="document.getElementById('av').textContent=this.value">
          </div>
        </div>
        <button class="btn bp" onclick="saveAuto()">Apply</button>
        <div class="n" id="n3"></div>
      </div>
    </div>

    <div class="s-sec">
      <div class="s-hd cl" onclick="togSec(this)">Data source <span class="s-ar">▾</span></div>
      <div class="s-bd cl">
        <div class="tip" style="color:var(--green)">📡 Auto-listening :3101</div>
        <hr class="sep">
        <div><label>CSV path</label><input type="text" id="csvp" placeholder="/path/to/player.csv"></div>
        <button class="btn bs" onclick="loadCsv()">Load CSV &amp; commentate</button>
        <hr class="sep">
        <button class="btn bs" onclick="injectDemo()">Inject demo data</button>
        <div class="n" id="n4"></div>
      </div>
    </div>

    <div class="s-sec">
      <div class="s-hd cl" onclick="togSec(this)">Kokoro TTS <span class="s-ar">▾</span></div>
      <div class="s-bd cl">
        <div class="tog">
          <input type="checkbox" id="tts-enabled" onchange="saveTts()">
          <label for="tts-enabled">Enable Kokoro TTS</label>
        </div>
        <div><label>TTS Server URL</label><input type="text" id="tts-url" placeholder="http://localhost:8881/tts"></div>
        <div>
          <label>Voice</label>
          <select id="tts-voice">
            <option value="bm_lewis">bm_lewis — British male (broadcaster)</option>
            <option value="bm_george">bm_george — British male</option>
            <option value="af_heart">af_heart — American female (warm)</option>
            <option value="af_bella">af_bella — American female (bright)</option>
            <option value="am_adam">am_adam — American male</option>
            <option value="am_michael">am_michael — American male (deep)</option>
          </select>
        </div>
        <div>
          <label>Speed: <span id="tts-speed-val">1.2</span></label>
          <div class="sl-row">
            <input type="range" min="0.5" max="2.0" step="0.1" value="1.2" id="tts-speed"
              oninput="document.getElementById('tts-speed-val').textContent=parseFloat(this.value).toFixed(1)">
          </div>
        </div>
        <button class="btn bp" onclick="saveTts()">Save TTS Config</button>
        <div class="n" id="n5"></div>
      </div>
    </div>

  </div>
</aside>

<script>
// ── Voice ─────────────────────────────────────────────────
let voices = [], voiceEnabled = true, selVoice = null;
let vRate = 1.1, vPitch = 1.0, vVol = 1.0;

function initVoices() {
  function load() {
    voices = speechSynthesis.getVoices();
    const sel = document.getElementById('vsel');
    sel.innerHTML = '';

    const zhVoices = [], enVoices = [];
    voices.forEach((v, i) => {
      if (v.lang.startsWith('zh')) zhVoices.push({ v, i });
      else if (v.lang.startsWith('en')) enVoices.push({ v, i });
    });

    if (enVoices.length > 0) {
      const g = document.createElement('optgroup');
      g.label = 'English';
      enVoices.forEach(({ v, i }) => {
        const o = document.createElement('option');
        o.value = i; o.textContent = `${v.name} (${v.lang})`;
        g.appendChild(o);
      });
      sel.appendChild(g);
    }

    if (zhVoices.length > 0) {
      const g = document.createElement('optgroup');
      g.label = 'Chinese';
      zhVoices.forEach(({ v, i }) => {
        const o = document.createElement('option');
        o.value = i; o.textContent = `${v.name} (${v.lang})`;
        g.appendChild(o);
      });
      sel.appendChild(g);
    }

    const defaultIdx = enVoices.length >= 2 ? enVoices[1].i : enVoices.length >= 1 ? enVoices[0].i : null;
    if (defaultIdx !== null) { sel.value = String(defaultIdx); syncVoice(); }
  }
  speechSynthesis.onvoiceschanged = load; load();
}

function syncVoice() {
  voiceEnabled = document.getElementById('ve').checked;
  vRate  = parseFloat(document.getElementById('vrr').value);
  vPitch = parseFloat(document.getElementById('vpr').value);
  vVol   = parseFloat(document.getElementById('vvr').value);
  const i = document.getElementById('vsel').value;
  selVoice = i !== '' ? voices[parseInt(i)] : null;
}

let sentenceQueue = [], sentenceTimer = null;

function splitSentences(text) {
  const parts = text.match(/[^.!?]+[.!?]+\s*/g);
  return parts ? parts.map(s => s.trim()).filter(Boolean) : [text.trim()];
}

function stopSpeech() {
  sentenceQueue = [];
  if (sentenceTimer) { clearTimeout(sentenceTimer); sentenceTimer = null; }
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

function speakSentence(text) {
  if (!voiceEnabled || !text || !('speechSynthesis' in window)) {
    sentenceTimer = setTimeout(playNextSentence, text.split(' ').length * 300 + 500);
    return;
  }
  const u = new SpeechSynthesisUtterance(text);
  if (selVoice) { u.voice = selVoice; u.lang = selVoice.lang; }
  else { u.lang = 'en-US'; }
  u.rate = vRate; u.pitch = vPitch; u.volume = vVol;
  u.onend = () => playNextSentence();
  speechSynthesis.speak(u);
}

function playNextSentence() {
  if (sentenceQueue.length === 0) return;
  const sentence = sentenceQueue.shift();
  showSubtitle(sentence);
  speakSentence(sentence);
}

function speak(text) { /* legacy, kept for test button */
  stopSpeech();
  sentenceQueue = splitSentences(text);
  playNextSentence();
}

function testVoice() { speak('Testing voice. Everything is working correctly.'); }

// ── Subtitle ──────────────────────────────────────────────
function showSubtitle(text) {
  const box  = document.getElementById('subtitle');
  const zhEl = document.getElementById('sub-zh');

  box.classList.remove('show');
  setTimeout(() => {
    zhEl.textContent = text;
    box.classList.add('show');
  }, 320);
}

function hideSubtitle() {
  document.getElementById('subtitle').classList.remove('show');
}

function showLoading(on) {
  document.getElementById('loading').classList.toggle('show', on);
}

// ── Kokoro TTS audio ─────────────────────────────────────
let currentAudio = null;

function playTtsAudio(base64, mime = 'audio/wav') {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
  const blob = new Blob([bytes], { type: mime });
  const url = URL.createObjectURL(blob);
  currentAudio = new Audio(url);
  currentAudio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; };
  currentAudio.play().catch(e => console.warn('Audio play failed:', e));
}

function stopTtsAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
}

// ── WS ────────────────────────────────────────────────────
let ws = null, pendingText = '';

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = () => { setWS(true);  pingLoop(); };
  ws.onclose = () => { setWS(false); setTimeout(connectWS, 3000); };
  ws.onerror = () => setWS(false);
  ws.onmessage = e => onMsg(JSON.parse(e.data));
}

function setWS(ok) {
  document.getElementById('ws-dot').className = 'ws-dot' + (ok ? ' on' : '');
  document.getElementById('ws-lbl').textContent = ok ? 'Connected' : 'Reconnecting...';
}
function pingLoop() {
  if (ws && ws.readyState === WebSocket.OPEN) { ws.send('ping'); setTimeout(pingLoop, 15000); }
}

function onMsg(msg) {
  switch (msg.type) {
    case 'connected': updateStats(msg.stats); break;
    case 'user_msg':  updateStats(msg.stats); break;

    case 'ai_start':
      pendingText = '';
      stopSpeech();
      stopTtsAudio();
      showLoading(true);
      break;

    case 'token':
      pendingText += msg.text;
      break;

    case 'ai_done': {
      showLoading(false);
      const fullText = pendingText.trim();
      if (document.getElementById('tts-enabled').checked) {
        // Kokoro TTS handles audio — just show subtitle now, audio comes via tts_audio
        showSubtitle(fullText);
      } else {
        // Browser TTS: play sentence by sentence
        const newSentences = splitSentences(fullText);
        const wasEmpty = sentenceQueue.length === 0;
        sentenceQueue.push(...newSentences);
        if (wasEmpty) playNextSentence();
      }
      updateStats(msg.stats);
      pendingText = '';
      break;
    }

    case 'tts_audio':
      stopSpeech();
      playTtsAudio(msg.audio, msg.mime);
      break;

    case 'error':
      showLoading(false);
      showSubtitle('⚠ ' + msg.message, '');
      pendingText = '';
      break;
  }
}

// ── Stats ─────────────────────────────────────────────────
function updateStats(s) {
  if (!s) return;
  const used = (s.system_tokens || 0) + (s.history_tokens || 0);
  const max  = s.max_context_tokens || 4096;
  const pct  = Math.min(100, (used / max) * 100);
  document.getElementById('tok-fill').style.width = pct + '%';
  document.getElementById('tok-fill').style.background =
    pct > 80 ? '#ef4444' : pct > 60 ? '#f97316' : '#0ea5e9';
  document.getElementById('tok-lbl').textContent = `${used} / ${max}`;
}

// ── Drawer ────────────────────────────────────────────────
function openDrawer()  { document.getElementById('overlay').classList.add('open'); document.getElementById('drawer').classList.add('open'); }
function closeDrawer() { document.getElementById('overlay').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }
function togSec(h)     { h.classList.toggle('cl'); h.nextElementSibling.classList.toggle('cl'); }

// ── Config ────────────────────────────────────────────────
async function loadConfig() {
  try {
    const r = await fetch('/api/config'), c = await r.json();
    const a = c.api, x = c.context;
    document.getElementById('url').value   = a.base_url;
    document.getElementById('mdl').value   = a.model;
    document.getElementById('st').checked  = a.stream;
    document.getElementById('tr').value    = a.temperature;
    document.getElementById('tv').textContent = parseFloat(a.temperature).toFixed(2);
    document.getElementById('ctr').value   = x.max_context_tokens;
    document.getElementById('ctv').textContent = x.max_context_tokens;
    document.getElementById('rtr').value   = x.max_response_tokens;
    document.getElementById('rtv').textContent = x.max_response_tokens;
    document.getElementById('persona').value = x.commentator_persona;
    const iv = c.auto_interval || 0;
    document.getElementById('ar').value   = iv;
    document.getElementById('av').textContent = iv;

    if (c.tts) {
      document.getElementById('tts-enabled').checked = c.tts.enabled;
      document.getElementById('tts-url').value        = c.tts.url;
      document.getElementById('tts-voice').value      = c.tts.voice;
      document.getElementById('tts-speed').value      = c.tts.speed;
      document.getElementById('tts-speed-val').textContent = parseFloat(c.tts.speed).toFixed(1);
    }
  } catch(e) { console.warn('loadConfig:', e); }
}


function note(id, txt, ok) {
  const el = document.getElementById(id);
  el.textContent = txt; el.className = 'n ' + (ok ? 'ok' : 'err');
  setTimeout(() => { el.textContent = ''; el.className = 'n'; }, 3000);
}

async function saveApi() {
  const r = await fetch('/api/config/api', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      base_url: document.getElementById('url').value,
      api_key:  document.getElementById('key').value,
      model:    document.getElementById('mdl').value,
      temperature: parseFloat(document.getElementById('tr').value),
      stream:   document.getElementById('st').checked,
    }),
  });
  note('n1', r.ok ? '✓ Saved' : '✗ Failed', r.ok);
}

async function saveCtx() {
  const r = await fetch('/api/config/context', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      max_context_tokens:  parseInt(document.getElementById('ctr').value),
      max_response_tokens: parseInt(document.getElementById('rtr').value),
      commentator_persona: document.getElementById('persona').value,
    }),
  });
  const d = await r.json();
  if (d.stats) updateStats(d.stats);
  note('n2', r.ok ? '✓ Saved' : '✗ Failed', r.ok);
}

async function clearAll() {
  await fetch('/api/commentary/clear', { method: 'POST' });
  hideSubtitle();
  showLoading(false);
  speechSynthesis.cancel();
  pendingText = '';
}

async function saveAuto() {
  const v = parseInt(document.getElementById('ar').value);
  const r = await fetch('/api/config/auto_interval', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ interval: v }),
  });
  note('n3', r.ok ? (v > 0 ? `✓ Every ${v}s` : '✓ Disabled') : '✗ Failed', r.ok);
}

async function loadCsv() {
  const p = document.getElementById('csvp').value.trim();
  if (!p) { note('n4', 'Please enter a path', false); return; }
  const r = await fetch('/api/csv/load', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ path: p }),
  });
  const d = await r.json();
  note('n4', d.error ? '✗ ' + d.error : `✓ Loaded ${d.rows_loaded} rows`, !d.error);
}

async function injectDemo() {
  await fetch('/api/telemetry/push', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      telemetry: { lap:2, throttle:0.92, brake:0.0, steer:-0.15,
        curLapTime:27.8, damage:0, fuel:88.5, gear:4,
        lastLapTime:59.63, racePos:2, rpm:6800, speedX:178.4 },
      rankings: [
        { car_name:'scr_server 1', race_pos:1, laps:2 },
        { car_name:'player 1',     race_pos:2, laps:2 },
        { car_name:'scr_server 2', race_pos:3, laps:2 },
      ],
    }),
  });
  note('n4', '✓ Demo data injected', true);
}

async function saveTts() {
  const r = await fetch('/api/config/tts', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      enabled: document.getElementById('tts-enabled').checked,
      url:     document.getElementById('tts-url').value.trim(),
      voice:   document.getElementById('tts-voice').value,
      speed:   parseFloat(document.getElementById('tts-speed').value),
    }),
  });
  note('n5', r.ok ? '✓ Saved' : '✗ Failed', r.ok);
}

async function manual() {
  await fetch('/api/commentary/manual', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ prompt: null }),
  });
}

document.addEventListener('keydown', e => {
  const t = document.activeElement.tagName;
  if (e.key === 'Enter' && !e.shiftKey && t !== 'INPUT' && t !== 'TEXTAREA' && t !== 'SELECT') {
    manual();
  }
});

window.addEventListener('load', () => { connectWS(); loadConfig(); initVoices(); });
</script>
