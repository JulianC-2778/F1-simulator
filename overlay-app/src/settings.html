<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TORCS AI Overlay Settings</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>TORCS AI Overlay Settings</h1>
        <p id="backendStatus">Checking commentary service...</p>
      </div>
      <button id="reloadBackend" class="secondary" type="button">Reload</button>
    </header>

    <main class="settings-grid">
      <section class="panel">
        <h2>Connection</h2>
        <label>
          WebSocket URL
          <input id="wsUrl" type="text" spellcheck="false" />
        </label>
        <label>
          Reconnect interval
          <input id="reconnectDelayMs" type="number" min="500" step="500" />
        </label>
        <label>
          Ping interval
          <input id="pingIntervalMs" type="number" min="1000" step="1000" />
        </label>
        <button id="saveOverlay" type="button">Save Overlay Settings</button>
        <p id="overlayNote" class="note"></p>
      </section>

      <section class="panel">
        <h2>Model API</h2>
        <label>
          Provider
          <select id="provider">
            <option value="openai">OpenAI / compatible</option>
            <option value="anthropic">Anthropic Claude</option>
            <option value="ollama">Ollama / LM Studio</option>
          </select>
        </label>
        <label>
          Base URL
          <input id="baseUrl" type="text" spellcheck="false" placeholder="http://127.0.0.1:1234/v1" />
        </label>
        <label>
          API Key
          <input id="apiKey" type="password" spellcheck="false" placeholder="Leave blank to keep saved key" />
        </label>
        <label>
          Model
          <input id="model" type="text" spellcheck="false" placeholder="granite-4.1-8b" />
        </label>
        <label>
          Temperature <span id="temperatureValue">0.80</span>
          <input id="temperature" type="range" min="0" max="2" step="0.05" />
        </label>
        <label class="check-row">
          <input id="stream" type="checkbox" />
          Streaming output
        </label>
        <button id="saveApi" type="button">Save Model API</button>
        <p id="apiNote" class="note"></p>
      </section>

      <section class="panel wide">
        <h2>Commentator Persona</h2>
        <div class="split">
          <label>
            Context tokens <span id="contextTokensValue">4096</span>
            <input id="contextTokens" type="range" min="512" max="32768" step="256" />
          </label>
          <label>
            Response tokens <span id="responseTokensValue">512</span>
            <input id="responseTokens" type="range" min="128" max="4096" step="64" />
          </label>
        </div>
        <label>
          System Prompt
          <textarea id="persona" rows="8"></textarea>
        </label>
        <button id="saveContext" type="button">Save Persona</button>
        <p id="contextNote" class="note"></p>
      </section>

      <section class="panel">
        <h2>Voice</h2>
        <label class="check-row">
          <input id="voiceEnabled" type="checkbox" />
          Enable voice commentary
        </label>
        <label>
          Voice
          <select id="voiceSelect">
            <option value="">System default</option>
          </select>
        </label>
        <label>
          Rate <span id="voiceRateValue">1.1</span>
          <input id="voiceRate" type="range" min="0.5" max="2" step="0.1" />
        </label>
        <label>
          Pitch <span id="voicePitchValue">1.0</span>
          <input id="voicePitch" type="range" min="0.5" max="2" step="0.1" />
        </label>
        <label>
          Volume <span id="voiceVolumeValue">1.00</span>
          <input id="voiceVolume" type="range" min="0" max="1" step="0.05" />
        </label>
        <div class="button-row">
          <button id="testVoice" class="secondary" type="button">Test Voice</button>
          <button id="saveVoice" type="button">Save Voice</button>
        </div>
        <p id="voiceNote" class="note"></p>
      </section>

      <section class="panel">
        <h2>Auto Commentary</h2>
        <label>
          Mode
          <select id="autoMode">
            <option value="off">Off</option>
            <option value="interval">Interval</option>
            <option value="event">Event only</option>
            <option value="hybrid">Event + interval</option>
          </select>
        </label>
        <label>
          Baseline interval <span id="baselineIntervalValue">10</span>s
          <input id="baselineInterval" type="range" min="0" max="60" step="1" />
        </label>
        <label>
          Event window <span id="windowSecondsValue">6</span>s
          <input id="windowSeconds" type="range" min="1" max="30" step="1" />
        </label>
        <label>
          Event cooldown <span id="eventCooldownValue">1.0</span>s
          <input id="eventCooldown" type="range" min="0" max="10" step="0.5" />
        </label>
        <label>
          Dedupe window <span id="dedupeSecondsValue">10</span>s
          <input id="dedupeSeconds" type="range" min="0" max="60" step="1" />
        </label>
        <label>
          Max words <span id="maxWordsValue">45</span>
          <input id="maxWords" type="range" min="10" max="80" step="1" />
        </label>
        <button id="saveAuto" type="button">Save Auto Commentary</button>
        <p id="autoNote" class="note"></p>
      </section>

      <section class="panel wide">
        <h2>Data Source & Actions</h2>
        <div class="split">
          <label>
            CSV path
            <input id="csvPath" type="text" spellcheck="false" placeholder="/path/to/player.csv" />
          </label>
          <label>
            Rankings CSV path
            <input id="rankingsPath" type="text" spellcheck="false" placeholder="/path/to/rankings.csv" />
          </label>
        </div>
        <div class="button-row">
          <button id="loadCsv" class="secondary" type="button">Load CSV & Commentate</button>
          <button id="injectDemo" class="secondary" type="button">Inject Demo Data</button>
          <button id="manualCommentary" class="secondary" type="button">Trigger Commentary</button>
          <button id="clearHistory" class="danger" type="button">Clear History</button>
        </div>
        <p id="dataNote" class="note"></p>
      </section>
    </main>

    <script src="./settings.js"></script>
  </body>
</html>
